<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aleiba.lol | TikTok Elite Lookup</title>
    <link rel="icon" type="image/webp" href="https://image2url.com/r2/default/images/1774976910853-4da8c167-2a03-48c7-babb-db7f2ed8aa0e.webp">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00fff2; --accent-glow: rgba(0, 255, 242, 0.3); --bg-top: rgba(0, 255, 242, 0.15); --bg-bottom: rgba(59, 130, 246, 0.1); }
        .theme-violet { --accent: #a855f7; --accent-glow: rgba(168, 85, 247, 0.4); --bg-top: rgba(168, 85, 247, 0.2); --bg-bottom: rgba(192, 38, 211, 0.1); }
        .theme-emerald { --accent: #10b981; --accent-glow: rgba(16, 185, 129, 0.4); --bg-top: rgba(16, 185, 129, 0.2); --bg-bottom: rgba(6, 78, 59, 0.1); }
        .theme-rose { --accent: #fb7185; --accent-glow: rgba(251, 113, 133, 0.4); --bg-top: rgba(251, 113, 133, 0.2); --bg-bottom: rgba(159, 18, 57, 0.1); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; min-height: 100vh; }
        .mesh-gradient { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(at 0% 0%, var(--bg-top) 0px, transparent 50%), radial-gradient(at 100% 100%, var(--bg-bottom) 0px, transparent 50%); filter: blur(80px); }
        .glass { background: rgba(10, 15, 28, 0.7); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .accent-text { color: var(--accent); }
        .accent-bg { background-color: var(--accent); }
        .results-container.active .fade-in-node { animation: fadeInUp 0.7s forwards; opacity: 0; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .loading-spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--accent); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="mesh-gradient"></div>
    <nav class="max-w-6xl mx-auto mb-12 flex justify-between items-center glass p-4 rounded-3xl">
        <div class="flex items-center gap-4 cursor-pointer active:scale-95 transition-transform" onclick="resetPage()">
            <div class="w-12 h-12 rounded-xl overflow-hidden border border-white/10 shadow-2xl bg-slate-900">
                <img src="https://image2url.com/r2/default/images/1774976910853-4da8c167-2a03-48c7-babb-db7f2ed8aa0e.webp" class="w-full h-full object-cover">
            </div>
            <div>
                <h1 class="text-xl font-extrabold text-white">aleiba.<span class="accent-text">lol</span></h1>
                <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Premium Analytics</p>
            </div>
        </div>
        <select id="themeSelector" onchange="updateTheme(this.value)" class="bg-slate-950 border border-white/10 rounded-xl px-4 py-2 text-sm text-white outline-none cursor-pointer">
            <option value="default">Neon</option>
            <option value="theme-violet">Violet</option>
            <option value="theme-emerald">Emerald</option>
            <option value="theme-rose">Rose</option>
        </select>
    </nav>
    <main class="max-w-4xl mx-auto">
        <div class="text-center mb-12">
            <h2 onclick="resetPage()" class="text-5xl md:text-7xl font-extrabold mb-4 tracking-tighter cursor-pointer">TikTok <span class="accent-text">Lookup</span></h2>
        </div>
        <div class="glass p-3 rounded-[2.5rem] mb-16 flex flex-col md:flex-row gap-3">
            <input id="usernameInput" type="text" placeholder="Username..." onkeydown="if(event.key === 'Enter') fetchData()" class="flex-1 bg-white/5 rounded-[2rem] px-8 py-5 outline-none text-lg">
            <button id="fetchBtn" onclick="fetchData()" class="px-10 py-5 accent-bg text-black font-extrabold rounded-[2rem] transition-all flex items-center gap-2 active:scale-95">
                <span id="btnText">Fetch</span>
                <div id="btnLoader" class="loading-spinner"></div>
            </button>
        </div>
        <div id="resultsArea" class="results-container hidden space-y-4">
            <div class="glass p-8 rounded-[2.5rem] flex items-center gap-6 fade-in-node">
                <img id="avatar" src="" class="w-24 h-24 rounded-full border-4 border-white/10 object-cover">
                <div>
                    <h3 id="nickname" class="text-3xl font-extrabold">--</h3>
                    <p class="accent-text font-semibold">@<span id="usernameDisplay">--</span></p>
                    <p id="bio" class="text-gray-400 text-sm mt-1">--</p>
                </div>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 fade-in-node">
                <div class="glass p-6 rounded-[2rem] text-center"><p class="text-[10px] text-gray-500 font-bold mb-1">Followers</p><p id="followers" class="text-2xl font-extrabold accent-text">--</p></div>
                <div class="glass p-6 rounded-[2rem] text-center"><p class="text-[10px] text-gray-500 font-bold mb-1">Following</p><p id="following" class="text-2xl font-extrabold">--</p></div>
                <div class="glass p-6 rounded-[2rem] text-center"><p class="text-[10px] text-gray-500 font-bold mb-1">Likes</p><p id="likes" class="text-2xl font-extrabold">--</p></div>
                <div class="glass p-6 rounded-[2rem] text-center"><p class="text-[10px] text-gray-500 font-bold mb-1">Region</p><p id="region" class="text-sm font-bold">--</p></div>
            </div>
            <div class="glass p-8 rounded-[2rem] flex justify-between fade-in-node">
                <div><p class="text-[10px] text-gray-500 font-bold">Created</p><p id="created" class="text-xl font-bold">--</p></div>
                <div><p class="text-[10px] text-gray-500 font-bold">Passkey</p><p id="passkey" class="text-xl font-bold">--</p></div>
            </div>
        </div>
    </main>
    <script>
        lucide.createIcons();
        function updateTheme(themeName) { document.body.className = "p-4 md:p-8"; if(themeName !== 'default') document.body.classList.add(themeName); }
        function resetPage() { document.getElementById("resultsArea").classList.add("hidden"); document.getElementById("usernameInput").value = ""; window.scrollTo({top:0, behavior:'smooth'}); }
        async function fetchData() {
            const input = document.getElementById("usernameInput");
            const username = input.value.trim();
            if (!username) return;
            const btnText = document.getElementById("btnText");
            const btnLoader = document.getElementById("btnLoader");
            const area = document.getElementById("resultsArea");
            btnText.style.display = "none"; btnLoader.style.display = "block";
            try {
                const res = await fetch(`/lookup?username=${encodeURIComponent(username)}`);
                const data = await res.json();
                if (data.error) { alert(data.error); return; }
                document.getElementById("nickname").textContent = data.nickname;
                document.getElementById("usernameDisplay").textContent = data.username;
                document.getElementById("avatar").src = data.profile_pic;
                document.getElementById("bio").textContent = data.bio;
                document.getElementById("followers").textContent = Number(data.followers).toLocaleString();
                document.getElementById("following").textContent = Number(data.following).toLocaleString();
                document.getElementById("likes").textContent = Number(data.likes).toLocaleString();
                document.getElementById("region").textContent = data.region;
                document.getElementById("created").textContent = data.created;
                document.getElementById("passkey").textContent = data.has_passkey ? "Yes ✅" : "No ❌";
                area.classList.remove("hidden");
                area.classList.add("active");
            } catch (err) { alert("Lookup failed."); } finally { btnText.style.display = "block"; btnLoader.style.display = "none"; }
        }
    </script>
</body>
</html>
